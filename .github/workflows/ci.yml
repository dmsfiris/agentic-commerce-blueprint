name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check
      - run: npm run write:examples
      - run: git diff --exit-code -- examples
      - run: npm run scenarios > ecommerce-scenario-results.json
      - uses: actions/upload-artifact@v4
        with:
          name: ecommerce-scenario-results
          path: ecommerce-scenario-results.json
          if-no-files-found: error
          retention-days: 30
